{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пополнение баланса — SmartUrok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f8fafc; }
        .btn-primary { background: linear-gradient(90deg, #FF6B35 0%, #FFBE0B 100%); }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-xl mx-auto py-12 px-4">
        <h1 class="text-2xl font-bold mb-4">Пополнение баланса</h1>
        <p class="text-gray-600 mb-6">Выберите пакет уроков. Администратор свяжется с вами и пополнит баланс вручную.</p>

        <form method="post" class="bg-white shadow rounded-xl p-6 space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-gray-700 mb-2">Пакет уроков</label>
                {{ form.package }}
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Комментарий</label>
                {{ form.comment }}
            </div>
            <button type="submit" class="w-full text-white py-3 rounded-lg btn-primary">Отправить заявку</button>
        </form>

        <div class="mt-6">
            <a href="{% url 'student_dashboard' %}" class="text-primary hover:underline">← Вернуться в кабинет</a>
        </div>
    </div>
</body>
</html>
