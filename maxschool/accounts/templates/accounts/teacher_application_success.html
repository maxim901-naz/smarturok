{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application sent | SmartUrok</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-2xl items-center px-4 py-12 sm:px-6 lg:px-8">
        <section class="w-full rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-sm">
            <img src="{% static 'images/logo4-round.png' %}" alt="SmartUrok" class="mx-auto h-14 w-14 rounded-full object-cover">
            <h1 class="mt-5 text-3xl font-bold">Application sent</h1>
            <p class="mt-3 text-slate-600">
                Thank you for applying{% if application.vacancy %} to <strong>{{ application.vacancy.title }}</strong>{% endif %}.
                We will review your details and contact you.
            </p>

            <div class="mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row">
                <a href="{% url 'teacher_application' %}" class="rounded-xl border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100">Submit another</a>
                <a href="{% url 'home' %}" class="rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">Go to home</a>
            </div>
        </section>
    </main>
</body>
</html>
