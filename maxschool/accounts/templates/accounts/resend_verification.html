{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Повторная отправка подтверждения — SmartUrok</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo4-round.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
        <div class="text-center mb-6">
            <img src="{% static 'images/logo3.png' %}" alt="SmartUrok" class="h-10 w-auto mx-auto mb-3">
            <h1 class="text-2xl font-bold text-slate-900">Подтверждение email</h1>
            <p class="text-sm text-slate-600 mt-2">Укажите email, и мы отправим новую ссылку для подтверждения.</p>
        </div>

        {% if messages %}
        <div class="space-y-2 mb-4">
            {% for message in messages %}
            <div class="rounded-lg border px-3 py-2 text-sm {% if message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-700{% else %}border-rose-200 bg-rose-50 text-rose-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="id_email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input
                    id="id_email"
                    type="email"
                    name="email"
                    required
                    value="{{ prefill_email|default:'' }}"
                    autocomplete="email"
                    class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 focus:outline-none"
                >
            </div>
            <button type="submit" class="w-full rounded-lg bg-orange-500 text-white py-3 font-semibold hover:bg-orange-600 transition">
                Отправить ссылку
            </button>
        </form>

        <div class="mt-5 flex justify-between text-sm">
            <a href="{% url 'login' %}" class="text-slate-700 hover:text-slate-900">Ко входу</a>
            <a href="{% url 'register' %}" class="text-orange-600 hover:text-orange-700">К регистрации</a>
        </div>
    </div>
</body>
</html>
