{% comment %} <h2>Записаться на пробный урок</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Отправить</button>
</form> {% endcomment %}
{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Запись на пробный урок — MaxSchool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black">

<section class="max-w-2xl mx-auto py-16 px-6">
    <h1 class="text-4xl font-bold text-center text-[#f5821e] mb-8">Записаться на пробный урок</h1>

    <form method="post" class="bg-gray-50 p-8 rounded-xl shadow-xl space-y-6 border border-orange-300">
        {% csrf_token %}

        <div>
            <label for="id_name" class="block text-lg font-semibold mb-1">Имя</label>
            <input type="text" name="name" id="id_name" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
        </div>

        <div>
            <label for="id_email" class="block text-lg font-semibold mb-1">Email</label>
            <input type="email" name="email" id="id_email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
        </div>

        <div>
            <label for="id_phone" class="block text-lg font-semibold mb-1">Телефон</label>
            <input type="text" name="phone" id="id_phone" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
        </div>

        <div>
            <label for="id_subject" class="block text-lg font-semibold mb-1">Предмет</label>
            <select name="subject" id="id_subject" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                <option value="">Выберите предмет</option>
                {% for s in subjects %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="id_preferred_time" class="block text-lg font-semibold mb-1">Дата и время(Лучше несколько)</label>
            <input type="text" name="preferred_time" id="id_preferred_time" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>

        <div>
            <label for="id_message" class="block text-lg font-semibold mb-1">Комментарий</label>
            <textarea name="message" id="id_message" rows="4" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"></textarea>
        </div>

        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition">
            Отправить заявку
        </button>
    </form>
</section>

</body>
</html>
