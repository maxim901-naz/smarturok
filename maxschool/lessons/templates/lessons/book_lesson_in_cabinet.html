{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на урок</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-xl mx-auto py-10 px-4">
        <h1 class="text-2xl font-bold mb-4">Запись на урок</h1>
        <div class="bg-white p-6 rounded-xl shadow">
            <p class="mb-2"><strong>Преподаватель:</strong> {{ teacher.get_full_name|default:teacher.username }}</p>
            <p class="mb-4"><strong>Время:</strong> {{ slot.date }} {{ slot.time }}</p>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block mb-2 text-gray-700">Выберите предмет</label>
                    <select name="subject" class="w-full p-2 border rounded-lg">
                        <option value="">-- Выберите предмет --</option>
                        {% for s in subjects %}
                            <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button class="w-full py-2 bg-orange-500 text-white rounded-lg">Записаться</button>
            </form>
        </div>
    </div>
</body>
</html>
